[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

####################################################
# AUTH LOG
####################################################

[INPUT]
    Name tail
    Path /logs/auth.log
    Tag auth
    Read_from_Head true
    Parser json_parser

####################################################
# POST LOG
####################################################

[INPUT]
    Name tail
    Path /logs/post.log
    Tag post
    Read_from_Head true
    Parser json_parser

####################################################
# NOTIFICATION LOG
####################################################

[INPUT]
    Name tail
    Path /logs/notification.log
    Tag notification
    Read_from_Head true
    Parser json_parser 

####################################################
# OUTPUT
####################################################

[OUTPUT]
    Name stdout
    Match *